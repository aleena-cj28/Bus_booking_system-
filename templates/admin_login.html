<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>    
<body>
    <h1>Admin Login</h1>

    <form action="/admin" method="POST">
        <label>Admin Username</label>
        <br>
        <input type="text" name="username">
        <br><br>

        <label>Admin Password</label>
        <br>
        <input type="password" name="password">
        <br><br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
